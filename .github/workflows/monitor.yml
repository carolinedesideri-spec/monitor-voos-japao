name: Monitor de Voos Japão

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

jobs:
  monitor:

    runs-on: ubuntu-latest

    steps:

    - name: Baixar código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Executar agente
      run: |
        python monitor.py
